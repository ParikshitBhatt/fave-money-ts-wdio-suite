name: TS Suite — BrowserStack App Automate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  browserstack-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci

      - name: Upload app build to BrowserStack (one-time per build artifact)
        env:
          BROWSERSTACK_USERNAME: ${{ secrets.BROWSERSTACK_USERNAME }}
          BROWSERSTACK_ACCESS_KEY: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}
        run: |
          RESPONSE=$(curl -u "$BROWSERSTACK_USERNAME:$BROWSERSTACK_ACCESS_KEY" \
            -X POST "https://api-cloud.browserstack.com/app-automate/upload" \
            -F "file=@./app-debug.apk")
          echo "BROWSERSTACK_APP_ID=$(echo $RESPONSE | jq -r '.app_url')" >> $GITHUB_ENV

      - name: Run suite on BrowserStack
        env:
          BROWSERSTACK_USERNAME: ${{ secrets.BROWSERSTACK_USERNAME }}
          BROWSERSTACK_ACCESS_KEY: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}
          BROWSERSTACK_APP_ID: ${{ env.BROWSERSTACK_APP_ID }}
        run: npm run test:browserstack

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wdio-report
          path: reports/
